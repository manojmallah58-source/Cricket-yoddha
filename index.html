<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaka Player - Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
        .manual-play-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.8); color: white; padding: 15px 25px;
            border-radius: 5px; cursor: pointer; z-index: 2000; display: none;
        }
    </style>
</head>
<body>

<div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline id="video"></video>
    <div class="manual-play-button" id="manualPlayButton">▶ Click to Play</div>
</div>

<script>
    async function initPlayer() {
        const params = new URLSearchParams(window.location.search);
        
        // URL se data nikalna (Aapke naye format ke hisaab se)
        const streamUrl = params.get('url');
        const drmLicense = params.get('drmLicense'); // Format: "keyId:key"
        const cookieVal = params.get('Cookie') || '';

        if (!streamUrl) {
            alert("No Stream URL found!");
            return;
        }

        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, document.querySelector('.shaka-video-container'), video);

        // DRM Setup
        if (drmLicense && drmLicense.includes(':')) {
            const [keyId, key] = drmLicense.split(':');
            player.configure({
                drm: {
                    clearKeys: { [keyId]: key }
                }
            });
        }

        // Headers aur Cookies fixing
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            request.headers['Referer'] = 'https://www.jiotv.com/';

            if (cookieVal) {
                // Cookie ko header mein set karna
                request.headers['Cookie'] = cookieVal;
                
                // Agar URL mein token nahi hai toh append karna
                if (!request.uris[0].includes('__hdnea__')) {
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += sep + cookieVal;
                }
            }
        });

        player.configure({
            streaming: {
                lowLatencyMode: true,
                rebufferingGoal: 2,
                bufferingGoal: 10
            }
        });

        try {
            await player.load(streamUrl);
            console.log('Stream loaded!');
            
            // Autoplay check
            try {
                await video.play();
            } catch (e) {
                document.getElementById('manualPlayButton').style.display = 'block';
            }
        } catch (error) {
            console.error('Error loading stream:', error);
        }

        document.getElementById('manualPlayButton').addEventListener('click', () => {
            video.play();
            document.getElementById('manualPlayButton').style.display = 'none';
        });
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
    document.addEventListener('DOMContentLoaded', () => {
        shaka.polyfill.installAll();
    });
</script>
</body>
</html>
