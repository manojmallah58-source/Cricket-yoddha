<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
        #channelTitle { position: absolute; left: 10px; top: 10px; color: white; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 4px; font-size: 14px; border-left: 3px solid red; }
        .manual-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: red; color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; z-index: 20; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="channelTitle">Loading Stream...</div>
    <div class="shaka-video-container" data-shaka-player>
        <video autoplay muted playsinline id="video"></video>
        <div class="manual-play" id="playBtn">▶ CLICK TO PLAY</div>
    </div>

    <script>
        // SMART PARSER: Ye pure URL se data nikalega chahe nested ho
        function getParam(name) {
            const url = window.location.href;
            const regex = new RegExp("[?&]" + name + "=(^&#]*)");
            const results = regex.exec(url);
            return results ? decodeURIComponent(results[1].replace(/\+/g, " ")) : null;
        }

        const streamUrl = getParam('url');
        const keyId = getParam('keyId');
        const key = getParam('key');
        const cookie = getParam('cookie');
        const name = getParam('name') || "Live Sports";

        document.getElementById('channelTitle').textContent = name;

        async function init() {
            shaka.polyfill.installAll();
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, document.querySelector('.shaka-video-container'), video);

            // DRM Setup
            if (keyId && key) {
                player.configure({
                    drm: { clearKeys: { [keyId.trim()]: key.trim() } }
                });
            }

            // Headers & Cookie Fix
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
                
                if (cookie) {
                    let fullCookie = cookie.includes('hdnea') && !cookie.includes('__hdnea__') 
                                     ? cookie.replace('hdnea', '__hdnea__') 
                                     : cookie;
                    
                    request.headers['Cookie'] = fullCookie;

                    request.uris.forEach((uri, i) => {
                        if (!uri.includes('hdnea')) {
                            const sep = uri.includes('?') ? '&' : '?';
                            request.uris[i] = uri + sep + fullCookie;
                        }
                    });
                }
            });

            player.configure({ streaming: { lowLatencyMode: true } });

            try {
                await player.load(streamUrl);
                await video.play();
            } catch (e) {
                console.error("Load Error", e);
                if (e.code !== 7000) { // 7000 is load interrupted
                    document.getElementById('playBtn').style.display = 'block';
                }
            }

            document.getElementById('playBtn').addEventListener('click', () => {
                video.muted = false;
                video.play();
                document.getElementById('playBtn').style.display = 'none';
            });
        }

        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
