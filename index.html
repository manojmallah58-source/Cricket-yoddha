<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: sans-serif; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .manual-play-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.9); color: white; padding: 15px 25px;
            border-radius: 50px; cursor: pointer; font-size: 18px; font-weight: bold;
            z-index: 2000; border: none; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        #channelTitle {
            position: absolute; left: 15px; top: 15px; color: #fff; font-size: 14px;
            font-weight: bold; z-index: 1500; background: rgba(0,0,0,0.7);
            padding: 6px 12px; border-radius: 4px; border-left: 3px solid #ff0000;
        }
    </style>
</head>
<body>

    <div class="shaka-video-container youtube-theme" data-shaka-player>
        <video autoplay muted playsinline id="video"></video>
        <div id="channelTitle">Loading...</div>
        <div class="manual-play-button" id="manualPlayButton">▶ Tap to Start Stream</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        // 1. URL aur Cookie ko clean tarike se read karna
        const streamUrl = decodeURIComponent(params.get('url') || '');
        const keyId = params.get('keyId');
        const key = params.get('key');
        const channelName = params.get('name') || 'Live Stream';
        let rawCookie = params.get('cookie') || '';

        document.getElementById('channelTitle').textContent = channelName;

        async function initPlayer() {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) return;

            const video = document.getElementById('video');
            const container = document.querySelector('.shaka-video-container');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            ui.configure({ 'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'mute', 'volume', 'quality', 'fullscreen'] });

            if (keyId && key) {
                player.configure({ drm: { clearKeys: { [keyId]: key } } });
            }

            // 2. NETWORK FILTER: Yahan hum "Auto-Fix" kar rahe hain
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';

                if (rawCookie) {
                    // FIX: Agar 'hdnea' ke aage underscores nahi hain, toh ye khud laga dega
                    let cleanedCookie = rawCookie;
                    if (cleanedCookie.includes('hdnea') && !cleanedCookie.includes('__hdnea__')) {
                        cleanedCookie = cleanedCookie.replace('hdnea', '__hdnea__');
                    }

                    request.headers['Cookie'] = cleanedCookie;

                    // URL ke piche token lagana (Segments ke liye)
                    request.uris.forEach((uri, index) => {
                        if (!uri.includes('hdnea')) {
                            const sep = uri.includes('?') ? '&' : '?';
                            request.uris[index] = uri + sep + cleanedCookie;
                        }
                    });
                }
            });

            player.configure({
                streaming: { lowLatencyMode: true, bufferingGoal: 10, rebufferingGoal: 2 }
            });

            const manualBtn = document.getElementById('manualPlayButton');

            try {
                await player.load(streamUrl);
                try {
                    await video.play();
                } catch (e) {
                    manualBtn.style.display = 'block'; // Autoplay block hone par button dikhao
                }
            } catch (err) {
                document.getElementById('channelTitle').textContent = "Stream Load Failed";
            }

            manualBtn.addEventListener('click', async () => {
                manualBtn.style.display = 'none';
                video.muted = false;
                await video.play();
            });
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);
    </script>
</body>
</html>
