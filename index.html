<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Live Stream</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        .wrapper { display: flex; justify-content: center; align-items: center; height: 100%; width: 100%; }
        #player { width: 100%; max-width: 1000px; aspect-ratio: 16/9; }
    </style>
</head>
<body>

    <div class="wrapper">
        <video id="player" controls playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

    <script>
        const video = document.getElementById('player');
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('url');

        if (videoSrc) {
            if (Hls.isSupported()) {
                const hls = new Hls({
                    lowLatencyMode: true, // Low latency mode for faster start
                    manifestLoadingTimeOut: 10000,
                });
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    const player = new Plyr(video, { autoplay: true, muted: true });
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
            }
        }
    </script>
</body>
</html>
