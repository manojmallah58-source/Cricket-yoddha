<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crickly – Stream Player</title>

    <!-- Shaka Player Styles (Zaroori hai controls ke liye) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    
    <style>
        /* Image 1000072103.jpg jaisa look dene ke liye CSS */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Poora background black */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .video-wrapper {
            width: 100%;
            max-width: 100%;
            position: relative;
        }

        /* Shaka player container ko handle karne ke liye */
        .shaka-video-container {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
        }

        /* Loader ko center mein rakhne ke liye */
        .page-loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            color: white;
        }
    </style>
</head>

<body>

    <!-- Loading screen -->
    <div id="pageLoader" class="page-loader">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite;"></div>
        <p>Loading Stream...</p>
    </div>

    <div class="video-wrapper">
        <div class="shaka-video-container" data-shaka-player-container>
            <video id="video" data-shaka-player playsinline autoplay></video>
        </div>
    </div>

    <!-- Shaka Player Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    
    <!-- Aapki purani logic file jo video load karti hai -->
    <script type="module" src="player2.js"></script>

    <script>
        // Loader hatane ki script
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('pageLoader');
                if (loader) loader.style.display = 'none';
            }, 1000);
        });

        // CSS Animation for loader
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>

</body>
</html>
