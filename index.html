<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.0/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.0/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; max-width: 800px; }
        video { width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="shaka-video-container" id="video-container">
    <video id="video" playsinline></video>
</div>

<script>
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('video-container');
    const player = new shaka.Player(video);
    
    // Shaka UI Initialize
    const ui = new shaka.ui.Overlay(player, videoContainer, video);
    const controls = ui.getControls();

    // DRM Configuration
    player.configure({
        drm: { clearKeys: { '71719eea0bbb5319a4e854ac52ea7871': '752ed8f45c43ed858af4c1716c05241a' } }
    });

    // Load Stream
    async function init() {
        try {
            await player.load('YOUR_STREAM_URL_HERE');
        } catch (e) { console.error(e); }
    }

    init();
</script>
</body>
</html>
