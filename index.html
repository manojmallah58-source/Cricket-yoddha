<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Live Stream</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js" defer></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #player-container {
            width: 100%;
            max-width: 1000px;
        }

        #plyr-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="plyr-player" controls playsinline></video>
    </div>

    <script>
        // Page load hone ke baad script execute hogi
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url');
            const video = document.getElementById('plyr-player');

            if (videoSrc) {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        const availableQualities = hls.levels.map(l => l.height).sort((a, b) => b - a);
                        new Plyr(video, {
                            autoplay: true,
                            muted: true,
                            settings: ['quality', 'speed', 'loop'],
                            quality: {
                                default: availableQualities[0],
                                options: availableQualities,
                                forced: true,
                                onChange: (newQuality) => {
                                    hls.levels.forEach((level, index) => {
                                        if (level.height === newQuality) hls.currentLevel = index;
                                    });
                                }
                            }
                        });
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    new Plyr(video, { autoplay: true, muted: true });
                }
            }
        });
    </script>
</body>
</html>
